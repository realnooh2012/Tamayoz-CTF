version: '3.8'

services:
  server:
    build: ./server
    container_name: tamayoz-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-change_this_to_a_long_random_secret}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5173
      - NODE_ENV=production
      - DB_PATH=/app/db/tamayoz.db
      - UPLOAD_DIR=/app/uploads
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ChangeMe123!}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@tamayoz.local}
    volumes:
      - server_db:/app/db
      - server_uploads:/app/uploads

  client:
    build: ./client
    container_name: tamayoz-client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  server_db:
  server_uploads:
